<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#F3A21C" />
    <title>eva is offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Roboto, "Open Sans", "Lato", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top center, rgba(243, 162, 28, 0.2), transparent 34%),
          linear-gradient(180deg, #fffaf4, #fbf4ea);
        color: #322620;
      }

      .card {
        width: min(100%, 420px);
        border-radius: 28px;
        border: 1px solid rgba(164, 129, 94, 0.28);
        background: rgba(255, 252, 247, 0.96);
        box-shadow: 0 28px 70px -40px rgba(110, 73, 75, 0.32);
        padding: 32px 28px;
        text-align: center;
      }

      img {
        width: 82px;
        height: 82px;
        border-radius: 24px;
        box-shadow: 0 18px 34px -24px rgba(110, 73, 75, 0.4);
      }

      h1 {
        margin: 22px 0 10px;
        font-size: 1.8rem;
        line-height: 1.15;
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.7;
        color: #5a4b42;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        background: #f3a21c;
        color: #fff;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="/pwa-icon-192.png" alt="eva app icon" />
      <h1>You’re offline right now</h1>
      <p>
        eva will be ready again as soon as your connection comes back. If you already opened the
        app once, most screens should still be available from the installed app shell.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
